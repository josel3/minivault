name: MiniVault CI — Unit & Cross Testing

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  TEST_PASSWORD: "minivault_ci_test_password_123"
  TEST_CONTENT: |
    DB_HOST=localhost
    DB_PORT=5432
    DB_USER=admin
    DB_PASS=supersecret
    API_KEY=abc123xyz
    DEBUG=false

jobs:
  # ────────────────────────────────────────────────────
  # UNIT TESTS — each language encrypts & decrypts itself
  # ────────────────────────────────────────────────────
  unit-test-python:
    name: Unit Test — Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Write test .env
        run: echo "${{ env.TEST_CONTENT }}" > test.env

      - name: Encrypt with Python
        run: echo "${{ env.TEST_PASSWORD }}" | python minivault.py create test.env test_py.enc
        # Non-interactive override via stdin for CI
        # We use the headless test script instead:

      - name: Run Python unit test
        run: python tests/test_unit.py python
        env:
          TEST_PASSWORD: ${{ env.TEST_PASSWORD }}
          TEST_CONTENT: ${{ env.TEST_CONTENT }}

  unit-test-node:
    name: Unit Test — Node.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Node unit test
        run: node tests/test_unit.js node
        env:
          TEST_PASSWORD: ${{ env.TEST_PASSWORD }}
          TEST_CONTENT: ${{ env.TEST_CONTENT }}

  unit-test-php:
    name: Unit Test — PHP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: openssl

      - name: Run PHP unit test
        run: php tests/test_unit.php php
        env:
          TEST_PASSWORD: ${{ env.TEST_PASSWORD }}
          TEST_CONTENT: ${{ env.TEST_CONTENT }}

  # ────────────────────────────────────────────────────
  # CROSS TESTS — interoperability between all versions
  # ────────────────────────────────────────────────────
  cross-test:
    name: Cross-Language Interoperability
    runs-on: ubuntu-latest
    needs: [unit-test-python, unit-test-node, unit-test-php]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: openssl

      - name: Run cross-language test suite
        run: python tests/test_cross.py
        env:
          TEST_PASSWORD: ${{ env.TEST_PASSWORD }}
          TEST_CONTENT: ${{ env.TEST_CONTENT }}
